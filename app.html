<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QRFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Unbounded:wght@700;900&display=swap" rel="stylesheet"/>

<!-- QR Styling -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qr-code-styling/1.6.0/qr-code-styling.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#0b0b12;color:#fff;font-family:monospace;padding:20px}
.container{max-width:600px;margin:auto}
input,select{width:100%;padding:10px;margin:6px 0;background:#1a1a2a;border:1px solid #333;color:#fff}
button{width:100%;padding:12px;margin-top:10px;background:#4ade80;border:none;font-weight:bold;cursor:pointer}
#qr{margin-top:20px;display:flex;justify-content:center}
</style>
</head>

<body>

<div class="container">

<h2>🔥 QRFlow Pro Dashboard</h2>

<!-- LINK INPUT -->
<input id="link-id" placeholder="Link ID"/>
<input id="android" placeholder="Android URL"/>
<input id="ios" placeholder="iOS URL"/>
<input id="fallback" placeholder="Fallback URL"/>

<button onclick="saveLink()">Save Dynamic QR</button>

<hr/>

<h3>Advanced QR Generator</h3>

<input id="custom-data" placeholder="Enter any text / URL"/>

<input type="color" id="color1" value="#000000"/>
<input type="color" id="color2" value="#4ade80"/>

<select id="shape">
<option value="square">Square</option>
<option value="dots">Rounded</option>
<option value="classy">Classy</option>
</select>

<input type="file" id="logo"/>

<button onclick="generateQR()">Generate QR</button>
<button onclick="downloadQR()">Download PNG</button>

<div id="qr"></div>

</div>

<script>

// 🔹 SUPABASE CONFIG (replace with yours)
const supabase = window.supabase.createClient(
  "https://uolxpzsditolnbhwfitl.supabase.co",
  "sb_publishable_3y9LhtmC9P8og8O_T7P5nA_THHPNTsR"
);

let qr;

// 🔹 SAVE DYNAMIC QR
async function saveLink(){
  const id = document.getElementById('link-id').value;
  const android = document.getElementById('android').value;
  const ios = document.getElementById('ios').value;
  const fallback = document.getElementById('fallback').value;

  await supabase.from('qr_links').insert({
    id,
    android_url: android,
    ios_url: ios,
    fallback_url: fallback
  });

  alert("Saved!");
}

// 🔹 GENERATE QR (ADVANCED)
function generateQR(){

  const data = document.getElementById('custom-data').value;
  const color1 = document.getElementById('color1').value;
  const color2 = document.getElementById('color2').value;
  const shape = document.getElementById('shape').value;

  const file = document.getElementById('logo').files[0];
  let logoURL = null;

  if(file){
    logoURL = URL.createObjectURL(file);
  }

  document.getElementById('qr').innerHTML = "";

  qr = new QRCodeStyling({
    width: 300,
    height: 300,
    data: data,
    image: logoURL,

    dotsOptions: {
      type: shape,
      gradient: {
        type: "linear",
        colorStops: [
          { offset: 0, color: color1 },
          { offset: 1, color: color2 }
        ]
      }
    },

    backgroundOptions: {
      color: "#ffffff"
    },

    imageOptions: {
      margin: 8
    }
  });

  qr.append(document.getElementById("qr"));
}

// 🔹 DOWNLOAD
function downloadQR(){
  if(qr){
    qr.download({ name: "qrflow", extension: "png" });
  }
}

</script>

</body>
</html>
