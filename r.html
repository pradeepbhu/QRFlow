<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opening App...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#06060e;color:#f0f0fa;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center;padding:24px;}
.ring{width:50px;height:50px;border:3px solid rgba(255,255,255,0.07);border-top:3px solid #4ade80;border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
h2{font-size:17px;font-weight:500;opacity:.88;}
p{font-size:13px;opacity:.38;line-height:1.6;}
.manual{display:none;color:#4ade80;font-size:13px;border:1px solid rgba(74,222,128,.28);border-radius:99px;padding:8px 22px;text-decoration:none;margin-top:6px;}
.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:12px;padding:16px 20px;font-size:13px;color:#fca5a5;max-width:340px;line-height:1.7;display:none;}
</style>
</head>
<body>
<div class="ring" id="ring"></div>
<h2 id="msg">App Store pe redirect ho raha hai...</h2>
<p id="sub">Thoda ruko</p>
<a class="manual" id="manual-link" href="#">Manually open karo →</a>
<div class="err" id="err"></div>

<!-- SUPABASE CONFIG — YAHAN APNI DETAILS DAALO -->
<script>
var SUPABASE_URL = 'https://uolxpzsditolnbhwfitl.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_3y9LhtmC9P8og8O_T7P5nA_THHPNTsR';
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Parse query params: ?id=my-app&uid=user-uuid
var params = new URLSearchParams(window.location.search);
var linkId = params.get('id');
var userId = params.get('uid');

var ua = navigator.userAgent || navigator.vendor || window.opera;
var isAndroid = /android/i.test(ua);
var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

function showErr(msg) {
  document.getElementById('ring').style.display = 'none';
  document.getElementById('msg').textContent = 'Redirect failed';
  document.getElementById('sub').textContent = '';
  var e = document.getElementById('err');
  e.style.display = 'block'; e.textContent = msg;
}

function doRedirect(url) {
  document.getElementById('manual-link').href = url;
  document.getElementById('manual-link').style.display = 'inline-block';
  document.getElementById('sub').textContent = 'Redirecting...';
  setTimeout(function() { window.location.href = url; }, 700);
}

if (!linkId || !userId) {
  showErr('Invalid QR code. Dashboard se naya QR generate karo.');
} else {
  sb.from('qr_links')
    .select('android_url,ios_url,fallback_url')
    .eq('id', linkId)
    .eq('user_id', userId)
    .single()
    .then(function(res) {
      if (res.error || !res.data) {
        showErr('Link "' + linkId + '" nahi mili ya delete ho gayi.\n\nDashboard se check karo.');
        return;
      }
      var d = res.data;
      var target = d.fallback_url || 'https://yourwebsite.com';
      if (isAndroid && d.android_url) target = d.android_url;
      else if (isIOS && d.ios_url) target = d.ios_url;
      doRedirect(target);
    })
    .catch(function(e) { showErr('Network error: ' + e.message); });
}
</script>
</body>
</html>
